<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RFC 6455 WebSocket Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Consolas, monospace;
            background: #1a1a2e;
            color: #eee;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 520px;
            max-width: 95vw;
            background: #16213e;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            overflow: hidden;
        }

        .header {
            background: #0f3460;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 16px;
            font-weight: 600;
            color: #e94560;
        }

        .status {
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 12px;
            font-weight: 600;
        }

        .status.connected {
            background: #2ecc71;
            color: #fff;
        }

        .status.disconnected {
            background: #e74c3c;
            color: #fff;
        }

        .status.connecting {
            background: #f39c12;
            color: #fff;
        }

        #messages {
            height: 360px;
            overflow-y: auto;
            padding: 16px;
            background: #1a1a2e;
        }

        .message {
            margin-bottom: 8px;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 13px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .message.system {
            background: #0f3460;
            color: #a0a0c0;
            font-style: italic;
            text-align: center;
            font-size: 12px;
        }

        .message.sent {
            background: #0f3460;
            color: #eee;
            margin-left: 40px;
        }

        .message.received {
            background: #533483;
            color: #eee;
            margin-right: 40px;
        }

        .message .sender {
            font-weight: 700;
            color: #e94560;
            margin-right: 6px;
        }

        .input-area {
            display: flex;
            padding: 12px;
            background: #0f3460;
            gap: 8px;
        }

        .input-area input {
            flex: 1;
            padding: 10px 14px;
            border: none;
            border-radius: 8px;
            background: #1a1a2e;
            color: #eee;
            font-size: 14px;
            font-family: inherit;
            outline: none;
        }

        .input-area input:focus {
            box-shadow: 0 0 0 2px #e94560;
        }

        .input-area button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background: #e94560;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .input-area button:hover {
            background: #c0392b;
        }

        .footer {
            padding: 8px 16px;
            background: #16213e;
            text-align: center;
            font-size: 11px;
            color: #555;
        }

        #messages::-webkit-scrollbar {
            width: 6px;
        }

        #messages::-webkit-scrollbar-thumb {
            background: #533483;
            border-radius: 3px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>WebSocket Chat &mdash; RFC 6455</h1>
        <span id="status" class="status disconnected">DISCONNECTED</span>
    </div>

    <div id="messages"></div>

    <div class="input-area">
        <input type="text" id="msgInput" placeholder="Type a message and press Enter..." autocomplete="off">
        <button onclick="sendMessage()">Send</button>
    </div>

    <div class="footer">
        Open multiple tabs to test multi-client broadcast
    </div>
</div>

<script>
    // =========================================================================
    // WebSocket Chat Client
    // Uses the browser's built-in WebSocket API (handles RFC 6455 automatically)
    // =========================================================================

    const messagesDiv = document.getElementById('messages');
    const msgInput = document.getElementById('msgInput');
    const statusEl = document.getElementById('status');

    let ws = null;

    function setStatus(text, className) {
        statusEl.textContent = text;
        statusEl.className = 'status ' + className;
    }

    function addMessage(text, type) {
        const div = document.createElement('div');
        div.className = 'message ' + type;
        div.textContent = text;
        messagesDiv.appendChild(div);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function addFormattedMessage(sender, text, type) {
        const div = document.createElement('div');
        div.className = 'message ' + type;
        const senderSpan = document.createElement('span');
        senderSpan.className = 'sender';
        senderSpan.textContent = sender + ':';
        div.appendChild(senderSpan);
        div.appendChild(document.createTextNode(' ' + text));
        messagesDiv.appendChild(div);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function connect() {
        const wsUrl = 'ws://' + window.location.hostname + ':8765';
        setStatus('CONNECTING', 'connecting');
        addMessage('Connecting to ' + wsUrl + '...', 'system');

        ws = new WebSocket(wsUrl);

        ws.onopen = function() {
            setStatus('CONNECTED', 'connected');
            addMessage('WebSocket connection established', 'system');
            addMessage('Handshake completed (HTTP 101 Switching Protocols)', 'system');
        };

        ws.onmessage = function(event) {
            const data = event.data;

            // Parse "Username: message" format
            const colonIdx = data.indexOf(':');
            if (colonIdx > 0 && !data.startsWith('[')) {
                const sender = data.substring(0, colonIdx);
                const text = data.substring(colonIdx + 2);
                addFormattedMessage(sender, text, 'received');
            } else {
                addMessage(data, 'system');
            }
        };

        ws.onclose = function(event) {
            setStatus('DISCONNECTED', 'disconnected');
            addMessage('Connection closed (code: ' + event.code + ')', 'system');

            // Auto-reconnect after 3 seconds
            setTimeout(function() {
                addMessage('Reconnecting...', 'system');
                connect();
            }, 3000);
        };

        ws.onerror = function(error) {
            setStatus('ERROR', 'disconnected');
            addMessage('Connection error - is the server running?', 'system');
        };
    }

    function sendMessage() {
        const text = msgInput.value.trim();
        if (!text) return;

        if (!ws || ws.readyState !== WebSocket.OPEN) {
            addMessage('Not connected to server', 'system');
            return;
        }

        ws.send(text);
        addFormattedMessage('You', text, 'sent');
        msgInput.value = '';
        msgInput.focus();
    }

    msgInput.addEventListener('keydown', function(event) {
        if (event.key === 'Enter') {
            sendMessage();
        }
    });

    // Connect on page load
    connect();
</script>

</body>
</html>
